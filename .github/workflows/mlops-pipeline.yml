name: MLOps Continuous Integration Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  continuous-integration-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down the codebase onto the GitHub virtual runner machine
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    # 2. Provision a clean Python environment
    - name: Initialize Python 3.10 Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install required libraries
    - name: Install Application Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Run the training process to verify MLflow database writes work perfectly
    - name: Execute Model Training & Logging Pipeline
      run: |
        python src/train.py

    # 5. Build the Docker container image to verify it packages with zero errors
    - name: Verify Docker Container Build Stability
      run: |
        docker build -t customer-churn-api-test:latest .